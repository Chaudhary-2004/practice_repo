<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Error</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

.box{
padding:50px;
border-radius:20px;
background:#1e293b;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

h1{
font-size:90px;
margin:0;
color:#38bdf8;
}

h2{
margin:10px 0;
}

p{
font-size:18px;
opacity:.8;
}

a{
display:inline-block;
margin-top:25px;
padding:15px 30px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
transition:.3s;
}

a:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<div class="box">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you requested doesn't exist.<br>
Please return to the homepage.
</p>

<a href="index.html">🏠 Go Home</a>

</div>

</body>
</html>
